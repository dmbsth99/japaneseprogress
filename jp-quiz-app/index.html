<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Japanese Daily Quiz</title>

<style>
body { font-family: Arial; padding: 20px; background: #f5f5f5; }
.card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; }
button { padding: 10px; margin-top: 10px; width: 100%; }
.opt { display:block; margin:5px 0; }
.big { font-size: 30px; text-align:center; }
</style>
</head>

<body>

<div class="card">
  <h2>Daily Japanese Quiz</h2>
  <button onclick="startQuiz()">Start Quiz</button>
</div>

<div class="card">
  Total: <span id="total">0</span><br>
  Avg: <span id="avg">—</span>
</div>

<div id="quiz"></div>

<script>
const API_URL = "https://dmbsth99-japaneseprogress.vercel.app/api/quiz.js"; // 🔴 CHANGE THIS

const STORAGE = "jp_quiz_v1";

let state = {
  history: [],
  level: "beginner",
  lastDate: null
};

let quiz = {
  questions: [],
  current: 0,
  answers: []
};

/* ------------------ STORAGE ------------------ */

function today() {
  return new Date().toISOString().slice(0,10);
}

function load() {
  const data = localStorage.getItem(STORAGE);
  if (data) state = JSON.parse(data);
  updateStats();
}

function save() {
  localStorage.setItem(STORAGE, JSON.stringify(state));
}

/* ------------------ QUIZ ------------------ */

async function startQuiz() {

  if (state.lastDate === today()) {
    alert("Already done today");
    return;
  }

  document.getElementById("quiz").innerHTML = "Loading...";

  const res = await fetch(API_URL);
  const data = await res.json();

  quiz.questions = data.questions;
  quiz.current = 0;
  quiz.answers = [];

  showQuestion();
}

function showQuestion() {
  const q = quiz.questions[quiz.current];

  document.getElementById("quiz").innerHTML = `
    <div class="card">
      <div>${q.prompt}</div>
      ${q.options.map((o,i)=>`
        <button class="opt" onclick="answer(${i})">${o}</button>
      `).join("")}
    </div>
  `;
}

function answer(i) {
  const q = quiz.questions[quiz.current];
  const correct = i === q.correct;

  quiz.answers.push({
    correct,
    level: q.level
  });

  quiz.current++;

  if (quiz.current >= 5) finishQuiz();
  else showQuestion();
}

function finishQuiz() {
  const correct = quiz.answers.filter(a=>a.correct).length;
  const score = Math.round(correct / 5 * 100);

  const level = quiz.answers.reduce((best,a)=>{
    const levels = ['beginner','n5','n4','n3','n2','n1'];
    return levels.indexOf(a.level) > levels.indexOf(best) ? a.level : best;
  }, "beginner");

  state.history.unshift({
    date: today(),
    score,
    level
  });

  state.level = level;
  state.lastDate = today();

  save();
  updateStats();

  document.getElementById("quiz").innerHTML = `
    <div class="card">
      <div class="big">${correct}/5</div>
      <div>${score}%</div>
      <div>${level.toUpperCase()}</div>
    </div>
  `;
}

/* ------------------ UI ------------------ */

function updateStats() {
  document.getElementById("total").textContent = state.history.length;

  if (state.history.length > 0) {
    const avg = Math.round(state.history.reduce((s,h)=>s+h.score,0)/state.history.length);
    document.getElementById("avg").textContent = avg + "%";
  }
}

load();
</script>

</body>
</html>
